name: fxnstudio-cms

services:
  strapi:
    build:
      context: ./strapi
      dockerfile: Dockerfile
    container_name: fxn-strapi
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 1337
      # Database
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_SSL: "false"
      # Strapi secrets
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # Public URL
      PUBLIC_URL: https://cms.fxnstudio.com
      URL: https://cms.fxnstudio.com
      STRAPI_ADMIN_PREVIEW_BASE_URL: ${STRAPI_ADMIN_PREVIEW_BASE_URL:-https://preview.fxnstudio.com}
      # AI Writer plugin
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: claude-sonnet-4-5-20250929
      # Fal.ai for AI image generation (per-article lifecycle hook)
      FAL_KEY: ${FAL_KEY}
      FAL_IMAGE_MODEL: ${FAL_IMAGE_MODEL:-fal-ai/flux/schnell}
    volumes:
      - strapi-uploads:/opt/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fxn-net
    ports:
      - "127.0.0.1:8888:1337"

  postgres:
    image: postgres:16-alpine
    container_name: fxn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - fxn-net
    expose:
      - "5432"

volumes:
  postgres-data:
  strapi-uploads:

networks:
  fxn-net:
    driver: bridge
